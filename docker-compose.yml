version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: hoops
      POSTGRES_USER: hoops_user
      POSTGRES_PASSWORD: hoops_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    command: sh /app/entrypoint.sh
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data:
